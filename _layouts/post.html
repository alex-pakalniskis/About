<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} · Alex Pakalniskis</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark: #2d4f38;
      --green-mid: #4a7c59;
      --cream: #faf8f4;
      --ink: #1a1a18;
      --rule: #d6e8dc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lora', serif; background: var(--cream); color: var(--ink); line-height: 1.75; font-size: 17px; }
    .page { max-width: 680px; margin: 0 auto; padding: 4rem 2rem 6rem; }
    .back { font-size: 0.85rem; color: var(--green-mid); text-decoration: none; display: inline-block; margin-bottom: 2rem; }
    .back:hover { color: var(--green-dark); }
    .post-date { font-size: 0.85rem; color: #888; font-style: italic; margin-bottom: 1rem; }
    h1 { font-size: 1.9rem; color: var(--green-dark); line-height: 1.3; margin-bottom: 0.5rem; }
    .post-content { margin-top: 2rem; }
    .post-content p { margin-bottom: 1.2rem; }
    .post-content h2 { font-size: 1.2rem; color: var(--green-dark); margin: 2rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1.5px solid var(--rule); }
    .post-content a { color: var(--green-mid); }
    .post-content a:hover { color: var(--green-dark); }
    .post-content ul, .post-content ol { padding-left: 1.5rem; margin-bottom: 1.2rem; }
    .post-content li::marker { color: var(--green-mid); }
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="/blog/">← Blog</a>
    <div class="post-date">{{ page.date | date: "%B %-d, %Y" }}</div>
    <h1>{{ page.title }}</h1>
    <div class="post-content">{{ content }}</div>
  </div>
</body>
</html>
