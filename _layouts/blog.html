<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog · Alex Pakalniskis</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark: #2d4f38;
      --green-mid: #4a7c59;
      --cream: #faf8f4;
      --ink: #1a1a18;
      --rule: #d6e8dc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lora', serif; background: var(--cream); color: var(--ink); line-height: 1.75; font-size: 17px; }
    .page { max-width: 680px; margin: 0 auto; padding: 4rem 2rem 6rem; }
    .back { font-size: 0.85rem; color: var(--green-mid); text-decoration: none; display: inline-block; margin-bottom: 2rem; }
    .back:hover { color: var(--green-dark); }
    h1 { font-size: 2rem; color: var(--green-dark); margin-bottom: 2rem; }
    .post-list { list-style: none; }
    .post-item { padding: 1.25rem 0; border-bottom: 1.5px solid var(--rule); }
    .post-item:first-child { border-top: 1.5px solid var(--rule); }
    .post-date { font-size: 0.82rem; color: #888; font-style: italic; margin-bottom: 0.25rem; }
    .post-title a { font-size: 1.1rem; font-weight: 600; color: var(--ink); text-decoration: none; }
    .post-title a:hover { color: var(--green-mid); }
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="/">← Back</a>
    <h1>Blog</h1>
    <ul class="post-list">
      {% for post in site.posts %}
      <li class="post-item">
        <div class="post-date">{{ post.date | date: "%B %-d, %Y" }}</div>
        <div class="post-title"><a href="{{ post.url }}">{{ post.title }}</a></div>
      </li>
      {% endfor %}
    </ul>
  </div>
</body>
</html>
