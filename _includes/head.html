<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  {% seo %}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title | escape }}" href="{{ "/feed.xml" | relative_url }}">
  {% if page.custom_head %}{{ page.custom_head }}{% endif %}
  <style>
    a { color: #4a7c59 !important; }
    a:visited { color: #3a6147 !important; }
    a:hover { color: #2d4f38 !important; }
    li::marker {
      color: #2d4f38;
    }
  </style>
</head>
